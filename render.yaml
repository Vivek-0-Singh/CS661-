# Render Blueprint — deploys the backend API and the WebSocket relay.
# The frontend is deployed separately on Vercel (see vercel.json / DEPLOY.md).
#
# Create both services at once: Render Dashboard → New → Blueprint → pick this repo.
services:
  # --- FastAPI REST API + DuckDB -------------------------------------------
  - type: web
    name: cryptolens-api
    runtime: python
    plan: free
    rootDir: backend
    # Data is baked into the deploy at build time so no external DB is needed.
    # Widen INGEST_START/END to load more history (longer builds).
    buildCommand: >-
      pip install -r requirements.txt &&
      python -m ingestion.download --start "$INGEST_START" --end "$INGEST_END"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: INGEST_START
        value: "2024-01"
      - key: INGEST_END
        value: "2024-03"
      - key: CORS_ORIGINS
        value: "*"

  # --- Node WebSocket relay for the live order book ------------------------
  - type: web
    name: cryptolens-ws
    runtime: node
    plan: free
    rootDir: ws-server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"

  # --- Frontend static site (Vite) -----------------------------------------
  # Hosted on Render (not Vercel) so it's reachable on networks that can't
  # route to Vercel's edge IPs. VITE_* vars are baked in at build time.
  - type: web
    name: cryptolens-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE
        value: https://cryptolens-api-qayj.onrender.com/api
      - key: VITE_WS_URL
        value: wss://cryptolens-ws.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
